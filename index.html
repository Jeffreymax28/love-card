<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You ❤️</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: #050505;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      padding: 20px;
    }

    .bg-glow,
    .bg-glow2,
    .bg-glow3 {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: floatGlow 10s ease-in-out infinite;
    }

    .bg-glow {
      width: 300px;
      height: 300px;
      background: #ff4f8b;
      top: 10%;
      left: 8%;
    }

    .bg-glow2 {
      width: 280px;
      height: 280px;
      background: #8f5cff;
      bottom: 10%;
      right: 10%;
      animation-delay: 2s;
    }

    .bg-glow3 {
      width: 220px;
      height: 220px;
      background: #ff9ac2;
      top: 55%;
      left: 50%;
      transform: translateX(-50%);
      animation-delay: 4s;
    }

    @keyframes floatGlow {
      0%, 100% {
        transform: translateY(0px) scale(1);
      }

      50% {
        transform: translateY(-20px) scale(1.08);
      }
    }

    .stars {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
      animation: twinkle 3s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.2;
        transform: scale(0.8);
      }

      50% {
        opacity: 1;
        transform: scale(1.4);
      }
    }

    .container {
      position: relative;
      z-index: 3;
      text-align: center;
      width: 100%;
      max-width: 460px;
    }

    .open-btn {
      background: linear-gradient(135deg, #ff4f8b, #ff7eb3);
      color: white;
      border: none;
      padding: 16px 40px;
      font-size: 1.1rem;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 0 25px rgba(255, 79, 139, 0.45);
      transition: 0.35s ease;
      animation: pulseBtn 2.2s infinite;
    }

    .open-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 0 35px rgba(255, 79, 139, 0.7);
    }

    @keyframes pulseBtn {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 18px rgba(255, 79, 139, 0.35);
      }

      50% {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(255, 79, 139, 0.65);
      }
    }

    .hint {
      margin-top: 14px;
      color: rgba(255,255,255,0.65);
      font-size: 0.9rem;
      letter-spacing: 0.4px;
    }

    .card {
      margin-top: 24px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 28px;
      padding: 26px 22px;
      box-shadow: 0 20px 70px rgba(255, 79, 139, 0.18);
      opacity: 0;
      transform: translateY(50px) scale(0.96);
      pointer-events: none;
      transition: all 0.7s ease;
      max-height: 76vh;
      overflow-y: auto;
      text-align: left;
    }

    .card.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .message-line {
      opacity: 0;
      transform: translateY(12px);
      transition: all 0.7s ease;
      color: #fff;
      line-height: 1.9;
      font-size: 1rem;
      margin-bottom: 16px;
    }

    .message-line.show {
      opacity: 1;
      transform: translateY(0);
    }

    .message-line strong {
      color: #ff7eb3;
      font-size: 1.05rem;
    }

    .signature {
      color: #ff9ac2;
      font-weight: 700;
    }

    .close-btn {
      margin-top: 12px;
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 22px;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.3s ease;
      display: inline-block;
    }

    .close-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    .photo-popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.86);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.45s ease;
      z-index: 10;
      padding: 20px;
    }

    .photo-popup.show {
      opacity: 1;
      pointer-events: auto;
    }

    .photo-box {
      width: 100%;
      max-width: 420px;
      transform: scale(0.75) rotate(-3deg);
      transition: 0.45s ease;
      position: relative;
    }

    .photo-popup.show .photo-box {
      transform: scale(1) rotate(0deg);
    }

    .photo-box img {
      width: 100%;
      display: block;
      border-radius: 24px;
      border: 4px solid rgba(255,255,255,0.9);
      box-shadow: 0 20px 60px rgba(255, 79, 139, 0.38);
    }

    .photo-caption {
      margin-top: 14px;
      text-align: center;
      color: #ffd7e8;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
    }

    .photo-close {
      position: absolute;
      top: -12px;
      right: -12px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      background: #ff4f8b;
      color: white;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(255,79,139,0.45);
    }

    .floating-heart {
      position: absolute;
      font-size: 18px;
      color: rgba(255, 120, 170, 0.8);
      animation: floatHeart linear forwards;
      z-index: 2;
      pointer-events: none;
    }

    @keyframes floatHeart {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      100% {
        transform: translateY(-110vh) scale(1.5);
        opacity: 0;
      }
    }

    @media (max-width: 480px) {
      .card {
        padding: 22px 18px;
      }

      .message-line {
        font-size: 0.95rem;
      }

      .open-btn {
        padding: 14px 32px;
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>

  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>
  <div class="bg-glow3"></div>

  <div class="stars" id="stars"></div>

  <div class="container">
    <button class="open-btn" onclick="openCard()">Rawrrr</button>
    <div class="hint">tap me slowly ❤️</div>

    <div class="card" id="loveCard">
      <div id="messageContainer"></div>
      <button class="close-btn" onclick="closeCard()">Close</button>
    </div>
  </div>

  <div class="photo-popup" id="photoPopup">
    <div class="photo-box">
      <button class="photo-close" onclick="closePhoto()">×</button>
      <img src="https://raw.githubusercontent.com/Jeffreymax28/love-card/main/birthday-pic.jpg.jpeg" alt="Special memory">
      <div class="photo-caption">my favorite memory of us ✨</div>
    </div>
  </div>

  <script>
    const lines = [
      '<strong>Happy birthday hon❤️</strong><br>OH wait…..your not my hon anymore😝',
      'Anyways, I hope you have an amazing birthday. I hope your days filled with good food, laughter and terrible jokes.',
      'I promise you, this year and so, will be the best years of your life. May all your wishes and dreams come true (except the ones that involve getting rid of me🙂‍↕️😜). You’re an absolute angel, ik I’m not there yet in terms of understanding you better, but I’m catching up. I’d say I’m blessed to have you.',
      'Loving you was just so natural and no girls ever made me feel the way you made me feel. Sometimes I look at you and think how can someone be so beautiful. Wish I could call you mine and I wish you knew I’d take care of you and support you in ways you wouldn’t even imagine.',
      'Now go out there, have funnn, eat lots of cake and yes don’t be grumpy hon, if people keep wishing you happy birthday 🤪😚',
      'I hope my "I miss you" is actually felt by you and I really wish I was there! Would’ve made your day even special.',
      '<span class="signature">Take care😘<br><br>Love,<br>Savyo</span>'
    ];

    let revealTimeouts = [];
    let photoTimeout;

    function openCard() {
      const card = document.getElementById("loveCard");
      const container = document.getElementById("messageContainer");

      container.innerHTML = '';
      clearAllTimers();

      card.classList.add("show");

      lines.forEach((line, index) => {
        const p = document.createElement("div");
        p.className = "message-line";
        p.innerHTML = line;
        container.appendChild(p);

        const t = setTimeout(() => {
          p.classList.add("show");

          if (index === lines.length - 1) {
            photoTimeout = setTimeout(() => {
              document.getElementById("photoPopup").classList.add("show");
            }, 1200);
          }
        }, index * 1400);

        revealTimeouts.push(t);
      });

      burstHearts();
    }

    function closeCard() {
      clearAllTimers();
      document.getElementById("loveCard").classList.remove("show");
      document.getElementById("messageContainer").innerHTML = '';
      closePhoto();
    }

    function closePhoto() {
      document.getElementById("photoPopup").classList.remove("show");
    }

    function clearAllTimers() {
      revealTimeouts.forEach(t => clearTimeout(t));
      revealTimeouts = [];
      clearTimeout(photoTimeout);
    }

    function createStars() {
      const stars = document.getElementById("stars");

      for (let i = 0; i < 45; i++) {
        const star = document.createElement("div");
        star.classList.add("star");
        star.style.left = Math.random() * 100 + "vw";
        star.style.top = Math.random() * 100 + "vh";
        star.style.animationDelay = Math.random() * 3 + "s";
        star.style.animationDuration = (2 + Math.random() * 3) + "s";
        stars.appendChild(star);
      }
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("floating-heart");
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.bottom = "-20px";
      heart.style.fontSize = (14 + Math.random() * 16) + "px";
      heart.style.animationDuration = (5 + Math.random() * 4) + "s";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 9000);
    }

    function burstHearts() {
      for (let i = 0; i < 12; i++) {
        setTimeout(createHeart, i * 120);
      }
    }

    setInterval(createHeart, 900);
    createStars();
  </script>

</body>
</html>
